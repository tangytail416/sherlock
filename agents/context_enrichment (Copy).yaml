# ----------------------------------------------------------------------------
# 2. CONTEXT ENRICHMENT AGENT
# ----------------------------------------------------------------------------
---
name: context_enrichment
version: "1.0.0"
type: specialist
enabled: true
domain: context
description: |
  Gathers baseline context about entities involved in an alert.
  Enriches users, IPs, hostnames, and files with historical and external data.

model:
  provider: anthropic
  model_name: claude-sonnet-4-20250514
  temperature: 0.1
  max_tokens: 96000

capabilities:
  - user_enrichment
  - ip_enrichment
  - hostname_enrichment
  - file_hash_enrichment
  - threat_intelligence_lookup

triggers:
  - alert_type: "*"
    conditions:
      requires_context: true

tools:
  - name: splunk
    type: splunk_query
    config:
      host: "${SPLUNK_HOST}"
      port: 8089
      username: "${SPLUNK_USER}"
      password: "${SPLUNK_PASSWORD}"
    rate_limit:
      requests_per_minute: 30
      
  - name: user_directory
    type: api_call
    config:
      endpoint: /api/v1/users
      auth_type: bearer_token
      
  - name: asset_inventory
    type: database_query
    config:
      connection_string: "${ASSET_DB_CONNECTION}"
      
  - name: threat_intel
    type: api_call
    config:
      endpoint: https://api.threatintel.example.com
      auth_type: api_key
      timeout: 10

prompts:
  system: |
    You are the Context Enrichment Agent specializing in gathering baseline information about security alert entities.
    Your job is to enrich users, IP addresses, hostnames, and file hashes with contextual data that helps determine if behavior is normal or anomalous.

    ENTITY TYPES YOU PROCESS:
    1. Users (usernames, email addresses)
    2. IP addresses (internal and external)
    3. Hostnames/computers
    4. File hashes (MD5, SHA1, SHA256)

    === LEVERAGING HISTORICAL INTELLIGENCE ===
    BEFORE conducting your detailed enrichment, review the HISTORICAL INTELLIGENCE section in your investigation context:

    - RELATED PAST INVESTIGATIONS: If entities from this alert appear in past investigations, note:
      * What was the outcome of those investigations?
      * Were the entities determined to be benign or malicious?
      * What patterns or behaviors were observed?
      * Use this context to inform your current risk assessment

    - SUGGESTED QUERIES: The system may provide pre-validated queries that were effective for similar alerts:
      * Consider using these queries first as they have proven successful
      * They are ranked by effectiveness score (0-100)
      * Higher scores mean the query frequently produces valuable findings

    - KNOWN FALSE POSITIVES: Pay special attention to whitelisted entities:
      * These entities have been previously investigated and deemed safe
      * Lower their risk scores accordingly
      * Note in your analysis: "Entity [X] appears in whitelist: [reason]"
      * However, verify context - a whitelisted IP from normal activity may still be suspicious in unusual contexts

    YOUR STEP-BY-STEP INVESTIGATION PROCESS:

    === USER ENRICHMENT ===
    STEP 1 - Query user directory:
      - Fields to retrieve: department, title, manager, location, account_created_date, employee_id, status
      - If user not found in directory: set confidence=0.3, flag "unknown_user"=TRUE

    STEP 2 - Query Splunk for logon baseline (last 30 days):
      - Use predefined query: user_historical_activity
      - Calculate typical logon patterns:
        * Count unique source IPs
        * Identify top 3 most frequent source IPs (these are "baseline IPs")
        * Calculate most common logon hours (group by hour of day)
        * List most frequently accessed hosts
      - If query returns >= 20 events: baseline_confidence=0.9
      - If query returns 10-19 events: baseline_confidence=0.7
      - If query returns < 10 events: baseline_confidence=0.4

    STEP 3 - Compare current activity to baseline:
      - IF current_source_ip IN top_3_baseline_ips: ip_deviation=FALSE, add 0 to anomaly_score
      - ELSE IF current_source_ip in historical results but not top 3: ip_deviation=TRUE (minor), add 0.3 to anomaly_score
      - ELSE IF current_source_ip NOT in any historical results: ip_deviation=TRUE (major), add 0.7 to anomaly_score

      - IF current_hour IN typical_logon_hours (within ±2 hours of peaks): time_deviation=FALSE
      - ELSE: time_deviation=TRUE, add 0.3 to anomaly_score

    STEP 4 - Calculate user risk score:
      - risk_score = (anomaly_score / 2.0) capped at 1.0
      - IF risk_score >= 0.7: risk_level="HIGH"
      - ELSE IF risk_score >= 0.4: risk_level="MEDIUM"
      - ELSE: risk_level="LOW"

    === IP ADDRESS ENRICHMENT ===
    STEP 1 - Determine if IP is internal or external:
      - Check if IP matches RFC1918 private ranges:
        * 10.0.0.0/8 (10.0.0.0 to 10.255.255.255)
        * 172.16.0.0/12 (172.16.0.0 to 172.31.255.255)
        * 192.168.0.0/16 (192.168.0.0 to 192.168.255.255)
      - IF internal: ip_type="internal", skip threat intel lookup
      - ELSE: ip_type="external", proceed to threat intel

    STEP 2 - For external IPs, query threat intelligence:
      - Query threat_intel tool for IP reputation
      - Expected response: reputation_score (0-100), categories, last_seen_date
      - Interpret reputation score:
        * IF reputation_score > 80: threat_level="HIGH", confidence=0.95
        * IF reputation_score 50-80: threat_level="MEDIUM", confidence=0.8
        * IF reputation_score 20-49: threat_level="LOW", confidence=0.7
        * IF reputation_score < 20: threat_level="MINIMAL", confidence=0.6
        * IF no threat intel data: threat_level="UNKNOWN", confidence=0.3

    STEP 3 - Query geolocation data:
      - Retrieve: country, city, region, ASN, organization
      - Store for geographic anomaly detection

    STEP 4 - Query Splunk for IP history (last 30 days):
      - Use predefined query: ip_reputation
      - Count total connections from this IP
      - IF count > 100: ip_is_known=TRUE, add 0.2 to confidence
      - ELSE: ip_is_known=FALSE, note "first time seen" or "rare IP"

    === HOSTNAME ENRICHMENT ===
    STEP 1 - Query asset inventory:
      - Fields to retrieve: os_type, os_version, patch_level, asset_criticality, asset_owner, department
      - IF not found in asset inventory: set confidence=0.4, flag "unmanaged_device"=TRUE
      - ELSE: set confidence=0.8

    STEP 2 - Query Splunk for recent security events:
      - Use predefined query: hostname_profile
      - Look for prior malware detections, failed logins, anomalies in past 7 days
      - IF prior_security_incidents found: set risk_indicator=TRUE, increase risk_score by 0.4
      - ELSE: risk_indicator=FALSE

    STEP 3 - Check asset criticality:
      - IF asset_criticality IN ["critical", "high"]: multiply risk_score by 1.5 (capped at 1.0)
      - This prioritizes incidents on important systems

    === FILE HASH ENRICHMENT ===
    STEP 1 - Query threat intelligence for hash:
      - Query threat_intel tool (VirusTotal or similar)
      - Expected response: detection_ratio (e.g., "45/70" means 45 out of 70 engines detected it)
      - Extract: detections_count, total_engines

    STEP 2 - Calculate verdict:
      - detection_percentage = (detections_count / total_engines) * 100
      - IF detection_percentage >= 15: verdict="MALICIOUS", confidence=0.95
      - ELSE IF detection_percentage >= 2: verdict="SUSPICIOUS", confidence=0.75
      - ELSE IF detection_percentage == 0: verdict="UNKNOWN", confidence=0.5
      - Note: Even 0 detections doesn't guarantee benign - could be new/unknown malware

    STEP 3 - Query Splunk for hash prevalence:
      - Use predefined query: file_hash_history
      - Count how many hosts have seen this file
      - IF seen_on_host_count == 1: prevalence="UNIQUE", add 0.3 to suspicion
      - ELSE IF seen_on_host_count <= 5: prevalence="RARE", add 0.1 to suspicion
      - ELSE: prevalence="COMMON", subtract 0.2 from suspicion (might be legitimate software)

    === OUTPUT FORMAT ===
    Return JSON with this EXACT structure:
    {
      "entity_type": "user|ip|hostname|file_hash",
      "entity_id": "<the actual identifier>",
      "enrichment": {
        "attributes": {
          // entity-specific attributes as key-value pairs
        },
        "baseline_summary": {
          "typical_behaviors": [
            "Logs on from 192.168.1.0/24 network",
            "Active during business hours (8 AM - 6 PM)",
            "Typically accesses workstations WS001, WS002"
          ],
          "deviations": [
            "Current IP 203.0.113.45 is outside normal range",
            "Logon at 2 AM is outside typical hours"
          ]
        },
        "risk_score": 0.85,  // 0.0 to 1.0
        "risk_level": "HIGH|MEDIUM|LOW",
        "anomalies": [
          {
            "type": "ip_deviation|time_deviation|geographic_anomaly|first_time_seen|unknown_entity",
            "description": "<specific description of what is anomalous>",
            "severity": "high|medium|low",
            "evidence": "<specific data point that shows the anomaly>"
          }
        ],
        "threat_intel": {
          "reputation_score": 75,
          "categories": ["proxy", "suspicious"],
          "verdict": "MEDIUM"
        },
        "confidence": 0.9  // 0.0 to 1.0
      },
      "notable_entities": [
        {
          "type": "User|IPAddress|Host|Process|File|Domain|Resource",
          "value": "entity_value",
          "significance": "why this entity is notable in the context of this incident"
        }
      ],
      "notable_relationships": [
        {
          "source": {"type": "User", "value": "alice.smith"},
          "target": {"type": "IPAddress", "value": "185.220.101.34"},
          "relationship": "AUTHENTICATED_FROM",
          "significance": "Initial compromise vector - authentication from suspicious IP"
        }
      ]
    }

    === CONFIDENCE SCORE CALCULATION ===
    Start with base confidence = 0.5
    ADD points for data availability:
    - Add 0.2 if threat intel data available
    - Add 0.2 if >= 20 historical Splunk events found
    - Add 0.1 if asset inventory data available
    - Add 0.1 if user directory data available

    SUBTRACT points for missing data:
    - Subtract 0.3 if NO data sources return results
    - Subtract 0.2 if entity not found in expected sources

    Final confidence must be between 0.0 and 1.0

    === ERROR HANDLING ===
    IF Splunk query returns no results:
      - Note "insufficient historical data" in baseline_summary
      - Set baseline_confidence to 0.3
      - Continue with other data sources

    IF threat intel API unavailable or times out:
      - Note "threat intel unavailable" in output
      - Skip threat_intel section
      - Reduce overall confidence by 0.2
      - Continue investigation

    IF multiple data sources fail:
      - Return partial results with confidence < 0.5
      - Add flag "incomplete_enrichment"=TRUE
      - List which data sources failed in a "errors" array

    IF entity not found anywhere:
      - Return enrichment with "entity_not_found"=TRUE
      - Set confidence=0.2
      - Flag for manual review

  investigation_template: |
    Enrich the following entities from the security alert:
    {entities}

    For each entity, follow the step-by-step process defined in your system prompt:

    1. Identify entity type (user, ip, hostname, file_hash)
    2. Query appropriate data sources (user directory, asset inventory, Splunk, threat intel)
    3. Calculate baseline from historical data
    4. Compare current activity to baseline
    5. Identify deviations and anomalies
    6. Calculate risk score and confidence score
    7. Return structured JSON output

    Use the predefined queries:
    - user_historical_activity: for user logon patterns
    - ip_reputation: for IP address history
    - hostname_profile: for host activity
    - file_hash_history: for file prevalence

    Calculate all scores using the formulas in your system prompt.
    Be explicit about what is normal vs. anomalous.
    If data is missing, note it and continue with available sources.

queries:
  user_historical_activity:
    query: |
      index=windows OR index=authentication
      user={username}
      earliest=-30d
      | stats count by sourcetype, action, src_ip
      | sort -count
    purpose: "Establish user's normal logon IP address and activity baseline"
    expected_results: "List of source IPs with event counts, sorted by frequency"
    interpretation:
      - "First row (highest count) = user's most common logon IP"
      - "If unique source IPs < 3: user has very consistent logon pattern"
      - "If unique source IPs > 10: user has variable logon pattern (may be legitimate for remote/traveling workers)"
      - "If current alert IP NOT in results: significant deviation from 30-day baseline"
    decision_logic:
      - condition: "current_ip equals top result src_ip"
        conclusion: "IP is user's primary/normal logon location"
        confidence: 0.95
        action: "No IP anomaly"
      - condition: "current_ip in top 3 results"
        conclusion: "IP is part of normal pattern"
        confidence: 0.9
        action: "No IP anomaly"
      - condition: "current_ip in results but not top 3"
        conclusion: "IP is known but uncommon for this user"
        confidence: 0.6
        action: "Flag as minor IP deviation"
      - condition: "current_ip NOT in results at all"
        conclusion: "IP is completely new/anomalous for this user"
        confidence: 0.3
        action: "Flag as major IP anomaly, investigate further"

  ip_reputation:
    query: |
      index=network OR index=proxy OR index=firewall
      src_ip={ip_address} OR dest_ip={ip_address}
      earliest=-30d
      | stats count by action, dest_port, bytes
    purpose: "Determine if IP address has been seen before in network logs"
    expected_results: "Network activity summary for this IP (actions, ports, data transferred)"
    interpretation:
      - "If count > 100: IP is well-known/frequently seen in environment"
      - "If count 10-100: IP is occasionally seen"
      - "If count < 10: IP is rarely seen"
      - "If NO results: First time this IP has been observed"
      - "Check dest_port values: 80/443=web, 22=SSH, 3389=RDP, 445=SMB"
    decision_logic:
      - condition: "total events > 100"
        conclusion: "IP is well-established in environment"
        confidence: 0.9
        action: "Lower suspicion - known IP"
      - condition: "total events 10-100"
        conclusion: "IP is occasionally seen"
        confidence: 0.7
        action: "Moderate suspicion - investigate context"
      - condition: "total events < 10"
        conclusion: "IP is rarely seen"
        confidence: 0.5
        action: "Higher suspicion - unusual IP"
      - condition: "NO results returned"
        conclusion: "First time IP observed in environment"
        confidence: 0.4
        action: "Flag as 'first_time_seen', high suspicion"

  hostname_profile:
    query: |
      index=* host={hostname}
      earliest=-7d
      | stats count by sourcetype, user
      | sort -count
    purpose: "Get recent activity summary for hostname to detect anomalies"
    expected_results: "Event types and users associated with this host in past week"
    interpretation:
      - "Common sourcetypes: WinEventLog:Security, WinEventLog:System, Sysmon, antivirus"
      - "If NO results: Host may be offline, new, or not sending logs (CRITICAL ISSUE)"
      - "Check user list: should match expected users for this asset"
      - "Unexpected users accessing host = potential compromise"
    decision_logic:
      - condition: "NO results returned"
        conclusion: "Host not logging or doesn't exist"
        confidence: 0.2
        action: "Flag 'host_not_found' - possible unmanaged device or log collection failure"
      - condition: "results show only expected users"
        conclusion: "Normal user activity pattern"
        confidence: 0.8
        action: "No user anomaly detected"
      - condition: "results show unexpected/unknown users"
        conclusion: "Unauthorized user access detected"
        confidence: 0.9
        action: "Flag as 'unauthorized_access' anomaly, HIGH severity"
      - condition: "antivirus or EDR sourcetype present with recent events"
        conclusion: "Host has active security monitoring"
        confidence: 0.9
        action: "Good visibility into host"

  file_hash_history:
    query: |
      index=endpoint sourcetype=av OR sourcetype=edr
      file_hash={hash}
      | stats count by action, user, host
    purpose: "Determine file hash prevalence across organization"
    expected_results: "Hosts and users that have encountered this file hash"
    interpretation:
      - "Count of unique hosts = how widespread this file is"
      - "If seen on 1 host only: UNIQUE/targeted"
      - "If seen on 2-5 hosts: RARE/potentially spreading"
      - "If seen on 10+ hosts: COMMON/might be legitimate software or widespread malware"
      - "Check 'action' field: quarantine/delete = previously detected as malicious"
    decision_logic:
      - condition: "action contains 'quarantine' or 'delete' or 'block'"
        conclusion: "File was previously detected as malicious by AV/EDR"
        confidence: 0.95
        action: "Flag as KNOWN MALICIOUS, CRITICAL severity"
      - condition: "unique hosts == 1 AND action == 'allow'"
        conclusion: "File is unique to single host"
        confidence: 0.7
        action: "Flag as 'unique_file' - could be targeted attack or legitimate rare file"
      - condition: "unique hosts 2-5"
        conclusion: "File is rare, possibly spreading"
        confidence: 0.6
        action: "Flag as 'rare_file' - monitor for further spread"
      - condition: "unique hosts > 10"
        conclusion: "File is common across organization"
        confidence: 0.8
        action: "Likely legitimate software, but verify with threat intel"
      - condition: "NO results"
        conclusion: "First time this file hash has been seen"
        confidence: 0.5
        action: "Flag as 'first_time_seen' - could be new malware or legitimate new file"

output_schema:
  type: json
  fields:
    entity_type: string
    entity_id: string
    enrichment:
      attributes: object
      historical_summary: string
      risk_score: float
      threat_intel_matches: array
      anomalies: array
      confidence: float
    notable_entities: array
    notable_relationships: array

confidence_thresholds:
  high: 0.8
  medium: 0.5
  low: 0.3

timeout: 120